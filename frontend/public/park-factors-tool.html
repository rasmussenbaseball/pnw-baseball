  <script>/* Per-season home/road run data (inlined) */

// NW Baseball Stats: per-season home/road run-environment data.

// the preview sums games and runs across seasons, THEN computes the split.
//   hG/hR = games and total runs (both teams) at the team's actual home park
//   rG/rR = games and total runs on the road or at neutral sites

// LCSC: NAIA WS at Harris = home; postseason at own park = home). Neutral and
// relocated "home" dates count as road. Fall exhibitions excluded. Each season
