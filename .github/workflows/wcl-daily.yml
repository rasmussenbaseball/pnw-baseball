name: WCL Daily Scrape

on:
  # Twice daily, both Pacific. WCL is summer-only (PDT = UTC-7) so these
  # UTC times hold all season:
  #   - 8:00 AM PT  (15:00 UTC)        — overnight finals + scorer corrections
  #   - 10:30 PM PT (05:30 UTC next day) — that evening's scores / box scores
  # Each run does the full pipeline (schedule → box scores → aggregates →
  # PBP → fielding); every step is idempotent, so running twice is safe.
  schedule:
    - cron: '0 15 * * *'
    - cron: '30 5 * * *'
  workflow_dispatch:
    inputs:
      season:
        description: 'Season year (default 2026)'
        required: false
        default: '2026'
      rescrape:
        description: 'Re-parse box scores even if already ingested (true/false)'
        required: false
        default: 'false'
      limit:
        description: 'Max box scores to process (0 = unlimited)'
        required: false
        default: '0'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          # Retry the install so a transient PyPI/network blip doesn't fail
          # the whole run (and email Nate). pip's own --retries covers most
          # of it; the loop is a belt-and-suspenders backstop.
          for attempt in 1 2 3; do
            pip install --retries 5 --timeout 30 \
              requests beautifulsoup4 psycopg2-binary python-dotenv && break
            echo "pip install failed (attempt $attempt) — retrying in 10s"
            sleep 10
          done
          python -c "import requests, bs4, psycopg2, dotenv"

      - name: Refresh WCL schedule (picks up new games / status flips)
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          SEASON="${{ github.event.inputs.season || '2026' }}"
          echo "→ Refreshing schedule for season $SEASON"
          PYTHONPATH=backend python3 scripts/scrape_wcl_schedule.py --season "$SEASON"

      - name: Scrape unfinished box scores
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          SEASON="${{ github.event.inputs.season || '2026' }}"
          RESCRAPE="${{ github.event.inputs.rescrape || 'false' }}"
          LIMIT="${{ github.event.inputs.limit || '0' }}"

          ARGS="--season $SEASON"
          if [ "$RESCRAPE" = "true" ]; then ARGS="$ARGS --rescrape"; fi
          if [ -n "$LIMIT" ] && [ "$LIMIT" != "0" ]; then
            ARGS="$ARGS --limit $LIMIT"
          fi

          echo "→ python3 scripts/scrape_wcl_boxscores.py $ARGS"
          PYTHONPATH=backend python3 scripts/scrape_wcl_boxscores.py $ARGS

      # The old "Refresh WCL season aggregates (Pointstreak)" step was removed
      # June 2026: Pointstreak/StackSports now 403s (redirects to
      # https://stacksports.com, Forbidden), and it was redundant anyway. The
      # roll-up below (aggregate_summer_stats.py) rebuilds summer_batting_stats /
      # summer_pitching_stats from the wclstats.com box scores and OVERWRITES
      # whatever Pointstreak wrote, so the box-score pipeline is the source of
      # truth. scrape_summer.py is kept in the repo for manual/other-league use.

      - name: Resolve box-score player names + roll up + advanced stats
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          SEASON="${{ github.event.inputs.season || '2026' }}"
          echo "→ Resolving box-score names → summer_players"
          PYTHONPATH=backend python3 scripts/resolve_summer_game_players.py
          echo "→ Rolling per-game data up into season aggregates"
          PYTHONPATH=backend python3 scripts/aggregate_summer_stats.py --league WCL --season "$SEASON"
          echo "→ Computing wOBA / wRC+ / FIP / oWAR / pWAR"
          PYTHONPATH=backend python3 scripts/compute_summer_advanced.py --season "$SEASON"

      - name: Scrape WCL play-by-play (hitter approach splits)
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          SEASON="${{ github.event.inputs.season || '2026' }}"
          RESCRAPE="${{ github.event.inputs.rescrape || 'false' }}"
          # Runs AFTER box scores (for starter seeding) and name
          # resolution (so summer_players rosters exist to resolve
          # batter/pitcher IDs). Default mode only ingests final games
          # that don't yet have events, so new games are picked up daily.
          ARGS="--season $SEASON"
          if [ "$RESCRAPE" = "true" ]; then ARGS="$ARGS --rescrape"; fi
          echo "→ python3 scripts/scrape_summer_pbp.py $ARGS"
          PYTHONPATH=backend python3 scripts/scrape_summer_pbp.py $ARGS || true

      - name: Scrape WCL season fielding
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          SEASON="${{ github.event.inputs.season || '2026' }}"
          echo "→ Pulling WCL season fielding from wclstats.com"
          PYTHONPATH=backend python3 scripts/scrape_wcl_fielding.py --season "$SEASON" || true

      - name: Link summer ↔ spring players
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          SEASON="${{ github.event.inputs.season || '2026' }}"
          echo "→ Auto-linking summer_players to spring players"
          PYTHONPATH=backend python3 scripts/link_summer_to_spring.py --season "$SEASON"
