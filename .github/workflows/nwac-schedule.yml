name: NWAC Schedule Scraper

on:
  schedule:
    # Run every 2 hours from 11 AM to 9 PM Pacific (6 PM to 4 AM UTC next day)
    # 11am=18, 1pm=20, 3pm=22, 5pm=0, 7pm=2, 9pm=4 UTC
    - cron: '0 18,20,22,0,2,4 * * *'
  workflow_dispatch:  # Allow manual runs

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 psycopg2-binary python-dotenv

      - name: Scrape NWAC schedule
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SEASON_YEAR: '2026'
        run: |
          cd $GITHUB_WORKSPACE
          PYTHONPATH=backend python3 scripts/scrape_nwac_schedule.py
