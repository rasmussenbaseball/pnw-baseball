name: NWAC Schedule Scraper

on:
  schedule:
    # Run every 2 hours from 11 AM to 9 PM Pacific, plus two late-night runs.
    # The composite scoreboard only shows the CURRENT day's games, so a late
    # game (e.g. a 7:35 PM start ending ~10:30 PM) must be scraped before the
    # composite rolls over to the next day or its result is stranded. The 10 PM
    # and 11 PM PT runs catch those late finals during tournament week.
    # PT->UTC (PDT, UTC-7): 11am=18, 1pm=20, 3pm=22, 5pm=0, 7pm=2, 9pm=4,
    #                        10pm=5, 11pm=6 UTC
    - cron: '0 18,20,22,0,2,4,5,6 * * *'
  workflow_dispatch:  # Allow manual runs

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 psycopg2-binary python-dotenv

      - name: Scrape NWAC schedule
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SEASON_YEAR: '2026'
        run: |
          cd $GITHUB_WORKSPACE
          PYTHONPATH=backend python3 scripts/scrape_nwac_schedule.py
