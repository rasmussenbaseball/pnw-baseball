name: NWAC Box Score Scraper

on:
  # Run daily at 8 AM UTC (1 AM Pacific)
  schedule:
    - cron: '0 8 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      season:
        description: 'Season year'
        required: false
        default: '2026'

jobs:
  # Each batch runs as a SEPARATE JOB with its own runner (different IP)
  # This avoids WAF rate limiting that blocks a single IP after too many requests

  batch-1:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests==2.31.0 beautifulsoup4==4.12.3 lxml==5.1.0 \
            psycopg2-binary==2.9.11 python-dotenv==1.0.0 curl_cffi cloudscraper
      - name: Scrape batch 1 (10 teams)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: backend
        run: |
          SEASON="${{ github.event.inputs.season || '2026' }}"
          for team in bellevue bigbend bluemountain centralia chemeketa clackamas clark columbiabasin douglas edmonds; do
            echo "--- Scraping: $team ---"
            python3 scripts/scrape_boxscores.py --season "$SEASON" --team "$team" --division JUCO || true
            sleep $(( RANDOM % 6 + 8 ))
          done

  batch-2:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests==2.31.0 beautifulsoup4==4.12.3 lxml==5.1.0 \
            psycopg2-binary==2.9.11 python-dotenv==1.0.0 curl_cffi cloudscraper
      - name: Scrape batch 2 (10 teams)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: backend
        run: |
          SEASON="${{ github.event.inputs.season || '2026' }}"
          for team in everett graysharbor lane linnbenton lowercolumbia mthood olympic pierce shoreline skagitvalley; do
            echo "--- Scraping: $team ---"
            python3 scripts/scrape_boxscores.py --season "$SEASON" --team "$team" --division JUCO || true
            sleep $(( RANDOM % 6 + 8 ))
          done

  batch-3:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests==2.31.0 beautifulsoup4==4.12.3 lxml==5.1.0 \
            psycopg2-binary==2.9.11 python-dotenv==1.0.0 curl_cffi cloudscraper
      - name: Scrape batch 3 (10 teams)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: backend
        run: |
          SEASON="${{ github.event.inputs.season || '2026' }}"
          for team in southwesternoregon spokane tacoma treasurevalley umpqua wallawalla wenatcheevalley willamette yakimavalley; do
            echo "--- Scraping: $team ---"
            python3 scripts/scrape_boxscores.py --season "$SEASON" --team "$team" --division JUCO || true
            sleep $(( RANDOM % 6 + 8 ))
          done
