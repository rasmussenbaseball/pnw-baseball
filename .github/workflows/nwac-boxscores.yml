name: NWAC Box Score Scraper

on:
  schedule:
    # First pass: 10 PM Pacific (5 AM UTC next day).
    # Captures games for the first time, right after they're final.
    - cron: '0 5 * * *'
    # Second pass: 6 AM Pacific (13 UTC). Re-scrapes games from the
    # last 2 days to catch scorer corrections that land between the
    # 10 PM initial scrape and morning recap-graphic generation.
    # NWAC scorers frequently update earned-runs, hits, and pitcher
    # splits for several hours after a game ends.
    - cron: '0 13 * * *'
  workflow_dispatch:  # Allow manual runs
    inputs:
      mode:
        description: 'Run mode: daily (default), backfill, or recent'
        required: false
        default: 'daily'
      recent_days:
        description: 'For recent mode: how many days back to re-scrape'
        required: false
        default: '2'
      limit:
        description: 'Max games to process (0 = unlimited)'
        required: false
        default: '0'
      dry_run:
        description: 'Dry run (true/false)'
        required: false
        default: 'false'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 psycopg2-binary python-dotenv

      - name: Scrape NWAC box scores
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SEASON_YEAR: '2026'
          # Cron expression that triggered this run (empty for manual runs)
          TRIGGER_CRON: ${{ github.event.schedule }}
        run: |
          cd $GITHUB_WORKSPACE
          MODE="${{ github.event.inputs.mode }}"
          RECENT_DAYS="${{ github.event.inputs.recent_days }}"
          LIMIT="${{ github.event.inputs.limit }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"

          # If the morning cron (13 UTC) triggered this run, force recent mode.
          # The 10 PM cron (5 UTC) stays in daily mode.
          if [ "$TRIGGER_CRON" = "0 13 * * *" ]; then
            MODE="recent"
            RECENT_DAYS="${RECENT_DAYS:-2}"
          fi

          ARGS=""
          if [ "$MODE" = "backfill" ]; then
            ARGS="--backfill"
          elif [ "$MODE" = "recent" ]; then
            ARGS="--recent-days ${RECENT_DAYS:-2}"
          fi
          if [ -n "$LIMIT" ] && [ "$LIMIT" != "0" ]; then
            ARGS="$ARGS --limit $LIMIT"
          fi
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          echo "Trigger cron: $TRIGGER_CRON"
          echo "Running: python3 scripts/scrape_nwac_boxscores.py $ARGS"
          PYTHONPATH=backend python3 scripts/scrape_nwac_boxscores.py $ARGS

      # Note: recalculate_league_adjusted.py is NOT run here because it
      # times out on GitHub Actions (heavy query on full batting_stats).
      # It already runs nightly via the NWAC Stats workflow (nwac-stats.yml)
      # which will pick up any new box score data automatically.
