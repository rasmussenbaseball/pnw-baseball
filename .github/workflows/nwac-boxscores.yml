name: NWAC Box Score Scraper

on:
  # Run daily — three staggered batches to avoid WAF rate limiting
  schedule:
    - cron: '0 8 * * *'   # Batch 1: 1:00 AM Pacific
    - cron: '0 9 * * *'   # Batch 2: 2:00 AM Pacific
    - cron: '0 10 * * *'  # Batch 3: 3:00 AM Pacific
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      season:
        description: 'Season year'
        required: false
        default: '2026'
      batch:
        description: 'Batch to run (1, 2, 3, or all)'
        required: false
        default: 'all'

jobs:
  scrape-nwac-boxscores:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            requests==2.31.0 \
            beautifulsoup4==4.12.3 \
            lxml==5.1.0 \
            psycopg2-binary==2.9.11 \
            python-dotenv==1.0.0 \
            curl_cffi \
            cloudscraper

      - name: Determine batch
        id: batch
        run: |
          # For scheduled runs, determine batch from cron hour
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "08" ]; then
              echo "batch=1" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "09" ]; then
              echo "batch=2" >> $GITHUB_OUTPUT
            else
              echo "batch=3" >> $GITHUB_OUTPUT
            fi
          else
            echo "batch=${{ github.event.inputs.batch || 'all' }}" >> $GITHUB_OUTPUT
          fi

      - name: Scrape NWAC box scores
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: backend
        run: |
          SEASON="${{ github.event.inputs.season || '2026' }}"
          BATCH="${{ steps.batch.outputs.batch }}"
          echo "Season: $SEASON, Batch: $BATCH"

          # Split 28 NWAC teams into 3 batches of ~10 each
          BATCH1="bellevue bigbend bluemountain centralia chemeketa clackamas clark columbiabasin douglas edmonds"
          BATCH2="everett graysharbor lane linnbenton lowercolumbia mthood olympic pierce shoreline"
          BATCH3="skagitvalley southwesternoregon spokane tacoma treasurevalley umpqua wallawalla wenatcheevalley yakimavalley"

          run_batch() {
            local teams="$1"
            for team in $teams; do
              echo "--- Scraping team: $team ---"
              python3 scripts/scrape_boxscores.py --season "$SEASON" --team "$team" --division JUCO || true
              # Sleep between teams to avoid WAF rate limiting
              sleep $(( RANDOM % 6 + 10 ))
            done
          }

          if [ "$BATCH" = "1" ]; then
            run_batch "$BATCH1"
          elif [ "$BATCH" = "2" ]; then
            run_batch "$BATCH2"
          elif [ "$BATCH" = "3" ]; then
            run_batch "$BATCH3"
          else
            # Run all batches with longer pauses between them
            echo "=== Batch 1/3 ==="
            run_batch "$BATCH1"
            echo "=== Sleeping 60s between batches ==="
            sleep 60
            echo "=== Batch 2/3 ==="
            run_batch "$BATCH2"
            echo "=== Sleeping 60s between batches ==="
            sleep 60
            echo "=== Batch 3/3 ==="
            run_batch "$BATCH3"
          fi

          echo "=== NWAC scrape complete ==="
