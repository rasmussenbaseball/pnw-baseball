name: NWAC Box Score Scraper

on:
  # Run daily at 8 AM UTC (1 AM Pacific)
  schedule:
    - cron: '0 8 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      season:
        description: 'Season year'
        required: false
        default: '2026'

jobs:
  scrape-nwac-boxscores:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            requests==2.31.0 \
            beautifulsoup4==4.12.3 \
            lxml==5.1.0 \
            psycopg2-binary==2.9.11 \
            python-dotenv==1.0.0 \
            curl_cffi \
            cloudscraper

      - name: Scrape NWAC box scores
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: backend
        run: |
          SEASON="${{ github.event.inputs.season || '2026' }}"
          echo "Scraping NWAC box scores for season $SEASON..."
          python3 scripts/scrape_boxscores.py --season "$SEASON" --division JUCO
